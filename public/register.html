<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — SkyWings</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="page-wrapper">
        <nav class="navbar">
            <a href="index.html" class="navbar-brand">
                <span class="logo-icon">✈</span>
                <span>SkyWings</span>
            </a>
            <div class="navbar-links">
                <a href="login.html">Sign In</a>
            </div>
        </nav>

        <div class="auth-container">
            <div class="auth-card animate-fadeInUp">
                <div class="glass-card">
                    <h2>Create Account</h2>

                    <div id="successMsg" class="alert alert-success hidden"></div>
                    <div id="errorMsg" class="alert alert-error hidden"></div>

                    <form id="registerForm" onsubmit="return handleRegister(event)" autocomplete="off" data-form-type="other">
                        <!-- Hidden dummy fields to trick Chrome -->
                        <input type="text" style="display:none" tabindex="-1">
                        <input type="password" style="display:none" tabindex="-1">
                        <div class="form-group">
                            <label for="regUser">Username</label>
                            <input type="text" id="regUser" name="regUser" class="form-control" placeholder="Choose a username" required autocomplete="off" data-form-type="other" readonly onfocus="this.removeAttribute('readonly')">
                        </div>

                        <div class="form-group">
                            <label for="regEmail">Email Address</label>
                            <input type="text" id="regEmail" name="regEmail" class="form-control" placeholder="you@example.com" required autocomplete="off" data-form-type="other" readonly onfocus="this.removeAttribute('readonly')">
                        </div>

                        <div class="form-group">
                            <label for="regPhone">Phone Number</label>
                            <input type="text" id="regPhone" name="regPhone" class="form-control" placeholder="Enter phone number" required autocomplete="off" data-form-type="other" readonly onfocus="this.removeAttribute('readonly')">
                        </div>

                        <div class="form-group">
                            <label for="regPass">Password</label>
                            <input type="password" id="regPass" name="regPass" class="form-control" placeholder="Create a password" required minlength="4" autocomplete="off" data-form-type="other" readonly onfocus="this.removeAttribute('readonly')">
                        </div>

                        <button type="submit" class="btn btn-success btn-full btn-lg" id="registerBtn">
                            Create Account
                        </button>
                    </form>

                    <div class="auth-footer">
                        Already have an account? <a href="login.html">Sign in</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function handleRegister(e) {
            e.preventDefault();
            const form = document.getElementById('registerForm');
            const btn = document.getElementById('registerBtn');
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');

            const formData = new URLSearchParams({
                username: document.getElementById('regUser').value,
                email: document.getElementById('regEmail').value,
                phone: document.getElementById('regPhone').value,
                password: document.getElementById('regPass').value
            });
            btn.textContent = 'Creating account...';
            btn.disabled = true;
            errorMsg.classList.add('hidden');
            successMsg.classList.add('hidden');

            fetch('RegisterServlet', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: formData.toString()
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    successMsg.textContent = 'Account created! Redirecting to login...';
                    successMsg.classList.remove('hidden');
                    setTimeout(() => { window.location.href = 'login.html'; }, 1500);
                } else {
                    errorMsg.textContent = (data.message || 'Registration failed');
                    errorMsg.classList.remove('hidden');
                    btn.textContent = 'Create Account';
                    btn.disabled = false;
                }
            })
            .catch(() => {
                errorMsg.textContent = 'Connection error. Please try again.';
                errorMsg.classList.remove('hidden');
                btn.textContent = 'Create Account';
                btn.disabled = false;
            });

            return false;
        }
    </script>
</body>
</html>
