<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — SkyWings</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav>
        <a href="index.html">✈ SkyWings</a>
        <div><a href="login.html">Sign In</a></div>
    </nav>

    <div class="auth-container">
        <div class="auth-card">
            <div class="card">
                <h2>Create Account</h2>
                <div id="successMsg" class="alert alert-success hidden"></div>
                <div id="errorMsg" class="alert alert-error hidden"></div>

                <form id="registerForm" onsubmit="return handleRegister(event)" autocomplete="off">
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" id="regUser" class="form-control" placeholder="Choose a username" required>
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="text" id="regEmail" class="form-control" placeholder="you@example.com" required>
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="text" id="regPhone" class="form-control" placeholder="Enter phone number" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="regPass" class="form-control" placeholder="Create a password" required minlength="4">
                    </div>
                    <button type="submit" class="btn btn-success btn-full btn-lg" id="registerBtn">Create Account</button>
                </form>

                <div class="auth-footer">
                    Already have an account? <a href="login.html">Sign in</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        function handleRegister(e) {
            e.preventDefault();
            const btn = document.getElementById('registerBtn');
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');

            const formData = new URLSearchParams({
                username: document.getElementById('regUser').value,
                email: document.getElementById('regEmail').value,
                phone: document.getElementById('regPhone').value,
                password: document.getElementById('regPass').value
            });

            btn.textContent = 'Creating account...';
            btn.disabled = true;
            errorMsg.classList.add('hidden');
            successMsg.classList.add('hidden');

            fetch('RegisterServlet', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: formData.toString()
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    successMsg.textContent = 'Account created! Redirecting...';
                    successMsg.classList.remove('hidden');
                    setTimeout(() => { window.location.href = 'login.html'; }, 1500);
                } else {
                    errorMsg.textContent = data.message || 'Registration failed';
                    errorMsg.classList.remove('hidden');
                    btn.textContent = 'Create Account';
                    btn.disabled = false;
                }
            })
            .catch(() => {
                errorMsg.textContent = 'Connection error.';
                errorMsg.classList.remove('hidden');
                btn.textContent = 'Create Account';
                btn.disabled = false;
            });

            return false;
        }
    </script>

</body>
</html>
