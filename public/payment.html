<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment — SkyWings</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="page-wrapper">
        <nav class="navbar">
            <a href="index.html" class="navbar-brand">
                <span class="logo-icon">✈</span>
                <span>SkyWings</span>
            </a>
            <div class="navbar-links">
                <a href="seat.html">← Back</a>
            </div>
        </nav>

        <div class="page-header">
            <h1 class="animate-fadeInUp">Payment</h1>
            <p class="animate-fadeInUp delay-1">Complete your booking via UPI</p>
        </div>

        <div class="container" style="max-width:900px;">
            <div class="payment-layout animate-fadeInUp delay-2">

                <!-- Payment Form -->
                <div>
                    <div class="glass-card-static">
                        <h3 style="margin-bottom:1.5rem;">UPI Payment</h3>

                        <div id="errorMsg" class="alert alert-error hidden"></div>

                        <div class="form-group">
                            <label>Your Name</label>
                            <input type="text" id="payerName" class="form-control" placeholder="Enter your full name" required>
                        </div>

                        <div class="form-group">
                            <label>UPI ID</label>
                            <input type="text" id="upiId" class="form-control" placeholder="yourname@upi" required>
                        </div>

                        <div class="summary-divider" style="margin:1.5rem 0;"></div>

                        <button onclick="processPayment()" class="btn btn-accent btn-full btn-lg" id="payBtn">
                            Pay ₹<span id="payAmount">0</span>
                        </button>


                    </div>
                </div>

                <!-- Booking Summary -->
                <div>
                    <div class="flight-summary-sidebar">
                        <h4 style="margin-bottom:1rem; color:var(--color-primary);">Booking Summary</h4>

                        <div class="summary-item">
                            <span class="label">Flight</span>
                            <span class="value" id="summFlight"></span>
                        </div>
                        <div class="summary-item">
                            <span class="label">Route</span>
                            <span class="value" id="summRoute"></span>
                        </div>
                        <div class="summary-item">
                            <span class="label">Date</span>
                            <span class="value" id="summDate"></span>
                        </div>
                        <div class="summary-item">
                            <span class="label">Passengers</span>
                            <span class="value" id="summPassengers"></span>
                        </div>
                        <div class="summary-item">
                            <span class="label">Seats</span>
                            <span class="value" id="summSeats"></span>
                        </div>

                        <div class="summary-divider"></div>

                        <div class="price-breakdown">
                            <div class="price-breakdown-item">
                                <span class="label">Base Fare</span>
                                <span id="baseFare">₹0</span>
                            </div>
                            <div class="price-breakdown-item">
                                <span class="label">Taxes & Fees</span>
                                <span id="taxes">₹0</span>
                            </div>
                            <div class="price-breakdown-item total">
                                <span>Total</span>
                                <span class="value" id="totalAmount">₹0</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const flight = JSON.parse(sessionStorage.getItem('selectedFlight') || '{}');
        const passengers = JSON.parse(sessionStorage.getItem('passengers') || '[]');

        if (!flight.flightNumber) {
            window.location.href = 'flightsearch.html';
        }

        // Calculate totals
        const baseFare = flight.price * (passengers.length || 1);
        const taxes = Math.round(baseFare * 0.05); // 5% tax
        const totalAmount = baseFare + taxes;

        // Populate summary
        document.getElementById('summFlight').textContent = `${flight.flightNumber} — ${flight.airline}`;
        document.getElementById('summRoute').textContent = `${flight.from} → ${flight.to}`;
        document.getElementById('summDate').textContent = new Date(flight.date).toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' });
        document.getElementById('summPassengers').textContent = passengers.length || 1;
        document.getElementById('summSeats').textContent = (flight.selectedSeats || []).join(', ') || 'Not selected';
        document.getElementById('baseFare').textContent = `₹${baseFare.toLocaleString('en-IN')}`;
        document.getElementById('taxes').textContent = `₹${taxes.toLocaleString('en-IN')}`;
        document.getElementById('totalAmount').textContent = `₹${totalAmount.toLocaleString('en-IN')}`;
        document.getElementById('payAmount').textContent = totalAmount.toLocaleString('en-IN');

        // Store final amount
        flight.totalAmount = totalAmount;
        flight.taxes = taxes;
        sessionStorage.setItem('selectedFlight', JSON.stringify(flight));

        function processPayment() {
            const payerName = document.getElementById('payerName').value;
            const upiId = document.getElementById('upiId').value;

            if (!payerName || !upiId) {
                document.getElementById('errorMsg').textContent = 'Please enter your name and UPI ID.';
                document.getElementById('errorMsg').classList.remove('hidden');
                return;
            }

            if (!upiId.includes('@')) {
                document.getElementById('errorMsg').textContent = 'Please enter a valid UPI ID (e.g. yourname@upi).';
                document.getElementById('errorMsg').classList.remove('hidden');
                return;
            }

            const btn = document.getElementById('payBtn');
            btn.textContent = 'Processing payment...';
            btn.disabled = true;
            document.getElementById('errorMsg').classList.add('hidden');

            const user = JSON.parse(sessionStorage.getItem('user') || '{}');

            // Send booking to server
            const bookingData = new URLSearchParams({
                userId: user.id || 1,
                flightId: flight.flightId,
                flightDate: flight.date,
                seatClass: flight.seatClass,
                totalAmount: totalAmount,
                passengers: JSON.stringify(passengers),
                seats: JSON.stringify(flight.selectedSeats || [])
            });

            fetch('PaymentServlet', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: bookingData.toString()
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    sessionStorage.setItem('bookingResult', JSON.stringify({
                        pnr: data.pnr,
                        bookingId: data.bookingId,
                        ...flight,
                        passengers: passengers
                    }));
                    // Clear extras for fresh booking
                    sessionStorage.removeItem('cabBooking');
                    sessionStorage.removeItem('hotelBooking');
                    window.location.href = 'ticket.html';
                } else {
                    document.getElementById('errorMsg').textContent = (data.message || 'Payment failed');
                    document.getElementById('errorMsg').classList.remove('hidden');
                    btn.textContent = `Pay ₹${totalAmount.toLocaleString('en-IN')}`;
                    btn.disabled = false;
                }
            })
            .catch(() => {
                // For demo, proceed even if server is down
                const pnr = 'SW' + Math.random().toString(36).substring(2, 8).toUpperCase();
                sessionStorage.setItem('bookingResult', JSON.stringify({
                    pnr: pnr,
                    bookingId: Math.floor(Math.random() * 10000),
                    ...flight,
                    passengers: passengers
                }));
                // Clear extras for fresh booking
                sessionStorage.removeItem('cabBooking');
                sessionStorage.removeItem('hotelBooking');
                window.location.href = 'ticket.html';
            });
        }
    </script>
</body>
</html>
