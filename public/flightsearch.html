<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Flights — SkyWings</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="page-wrapper">
        <nav class="navbar">
            <a href="index.html" class="navbar-brand">
                <span class="logo-icon">✈</span>
                <span>SkyWings</span>
            </a>
            <div class="navbar-links">
                <span id="userGreeting" style="color: var(--text-secondary);"></span>
                <a href="index.html" onclick="sessionStorage.clear();">Logout</a>
            </div>
        </nav>

        <div class="page-header">
            <h1 class="animate-fadeInUp">Search Flights</h1>
            <p class="animate-fadeInUp delay-1">Find the best deals on domestic flights across India</p>
        </div>

        <section class="search-section">
            <div class="search-box glass-card-static animate-fadeInUp delay-2">

                <!-- Trip Type Toggle -->
                <div class="trip-type-toggle">
                    <input type="radio" name="tripType" id="oneWay" value="oneway" checked>
                    <label for="oneWay">One Way</label>
                    <input type="radio" name="tripType" id="roundTrip" value="roundtrip">
                    <label for="roundTrip">Round Trip</label>
                </div>

                <div id="searchErrorMsg" class="alert alert-error hidden" style="margin-bottom:1rem;"></div>

                <form id="searchForm" onsubmit="return searchFlights(event)">
                    <!-- Row 1: From, To, Date -->
                    <div class="search-fields">
                        <div class="form-group field-with-swap">
                            <label for="from">From</label>
                            <select id="from" name="from" class="form-control" required>
                                <option value="">Select City</option>
                                <option value="Delhi">Delhi (DEL)</option>
                                <option value="Mumbai">Mumbai (BOM)</option>
                                <option value="Bangalore">Bangalore (BLR)</option>
                                <option value="Chennai">Chennai (MAA)</option>
                                <option value="Hyderabad">Hyderabad (HYD)</option>
                                <option value="Kolkata">Kolkata (CCU)</option>
                            </select>
                            <button type="button" class="swap-btn" onclick="swapCities()" title="Swap cities">⇄</button>
                        </div>

                        <div class="form-group">
                            <label for="to">To</label>
                            <select id="to" name="to" class="form-control" required>
                                <option value="">Select City</option>
                                <option value="Delhi">Delhi (DEL)</option>
                                <option value="Mumbai">Mumbai (BOM)</option>
                                <option value="Bangalore">Bangalore (BLR)</option>
                                <option value="Chennai">Chennai (MAA)</option>
                                <option value="Hyderabad">Hyderabad (HYD)</option>
                                <option value="Kolkata">Kolkata (CCU)</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="date">Departure Date</label>
                            <input type="date" id="date" name="date" class="form-control" required>
                        </div>
                    </div>

                    <!-- Row 2: Passengers, Class, Return Date -->
                    <div class="search-fields-row2">
                        <div class="form-group">
                            <label for="passengers">Passengers</label>
                            <select id="passengers" name="passengers" class="form-control">
                                <option value="1">1 Passenger</option>
                                <option value="2">2 Passengers</option>
                                <option value="3">3 Passengers</option>
                                <option value="4">4 Passengers</option>
                                <option value="5">5 Passengers</option>
                                <option value="6">6 Passengers</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="seatClass">Class</label>
                            <select id="seatClass" name="seatClass" class="form-control">
                                <option value="economy">Economy</option>
                                <option value="business">Business</option>
                            </select>
                        </div>

                        <div class="form-group" id="returnDateGroup" style="display:none;">
                            <label for="returnDate">Return Date</label>
                            <input type="date" id="returnDate" name="returnDate" class="form-control">
                        </div>

                        <div class="form-group" style="display:flex; align-items:flex-end;">
                            <button type="submit" class="btn btn-primary btn-lg btn-full" id="searchBtn">
                                🔍 Search Flights
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </section>

        <!-- Popular Routes -->
        <div class="container" style="max-width:900px;">
            <h3 class="mb-3 animate-fadeInUp delay-3" style="text-align:center; color: var(--text-secondary);">Popular Routes</h3>
            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem;" class="animate-fadeInUp delay-4">
                <div class="glass-card" style="padding:1.5rem; cursor:pointer; text-align:center;" onclick="quickSearch('Delhi','Mumbai')">
                    <div style="font-size:1.5rem; margin-bottom:0.5rem;">🏙️</div>
                    <div style="font-weight:600;">Delhi → Mumbai</div>
                    <div style="color: var(--color-accent); font-weight:700; margin-top:4px;">from ₹2,800</div>
                </div>
                <div class="glass-card" style="padding:1.5rem; cursor:pointer; text-align:center;" onclick="quickSearch('Mumbai','Bangalore')">
                    <div style="font-size:1.5rem; margin-bottom:0.5rem;">🌴</div>
                    <div style="font-weight:600;">Mumbai → Bangalore</div>
                    <div style="color: var(--color-accent); font-weight:700; margin-top:4px;">from ₹2,600</div>
                </div>
                <div class="glass-card" style="padding:1.5rem; cursor:pointer; text-align:center;" onclick="quickSearch('Bangalore','Chennai')">
                    <div style="font-size:1.5rem; margin-bottom:0.5rem;">🏖️</div>
                    <div style="font-weight:600;">Bangalore → Chennai</div>
                    <div style="color: var(--color-accent); font-weight:700; margin-top:4px;">from ₹2,200</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Set min date to today
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('date').min = today;
        document.getElementById('returnDate').min = today;

        // Show/hide return date based on trip type
        document.querySelectorAll('input[name="tripType"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                document.getElementById('returnDateGroup').style.display =
                    e.target.value === 'roundtrip' ? 'block' : 'none';
            });
        });

        // Show username
        const user = JSON.parse(sessionStorage.getItem('user') || '{}');
        if (user.username) {
            document.getElementById('userGreeting').textContent = `Hi, ${user.username}`;
        }

        function swapCities() {
            const from = document.getElementById('from');
            const to = document.getElementById('to');
            const temp = from.value;
            from.value = to.value;
            to.value = temp;
        }

        function quickSearch(from, to) {
            document.getElementById('from').value = from;
            document.getElementById('to').value = to;
            document.getElementById('date').value = today;
            searchFlights(new Event('submit'));
        }

        function searchFlights(e) {
            e.preventDefault();
            const from = document.getElementById('from').value;
            const to = document.getElementById('to').value;
            const date = document.getElementById('date').value;
            const passengers = document.getElementById('passengers').value;
            const seatClass = document.getElementById('seatClass').value;
            const tripType = document.querySelector('input[name="tripType"]:checked').value;

            if (from === to) {
                document.getElementById('searchErrorMsg').textContent = '❌ Source and destination cannot be the same!';
                document.getElementById('searchErrorMsg').classList.remove('hidden');
                return false;
            }
            document.getElementById('searchErrorMsg').classList.add('hidden');

            // Store search params and navigate
            const params = new URLSearchParams({
                from, to, date, passengers, seatClass, tripType
            });

            window.location.href = `flightresults.html?${params.toString()}`;
            return false;
        }
    </script>
</body>
</html>
