<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Flights — SkyWings</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav>
        <a href="index.html">✈ SkyWings</a>
        <div>
            <div class="user-dropdown-wrapper">
                <span class="user-name-link" id="userGreeting" onclick="toggleUserDropdown()"></span>
                <div class="user-dropdown-menu" id="userDropdownMenu">
                    <a href="mybookings.html" class="user-dropdown-item">Bookings</a>
                </div>
            </div>
            <a href="index.html" onclick="sessionStorage.clear();">Logout</a>
        </div>
    </nav>

    <div class="page-header">
        <h1>Search Flights</h1>
    </div>

    <section class="search-section">
        <div class="search-box card-static">
            <div id="searchErrorMsg" class="alert alert-error hidden" style="margin-bottom:1rem"></div>

            <form id="searchForm" onsubmit="return searchFlights(event)">
                <div class="search-fields">
                    <div class="form-group field-with-swap">
                        <label>From</label>
                        <select id="from" class="form-control" required>
                            <option value="">Select City</option>
                            <option value="Delhi">Delhi</option>
                            <option value="Mumbai">Mumbai</option>
                            <option value="Bangalore">Bangalore</option>
                            <option value="Chennai">Chennai</option>
                            <option value="Hyderabad">Hyderabad</option>
                            <option value="Kolkata">Kolkata</option>
                        </select>
                        <button type="button" class="swap-btn" onclick="swapCities()">⇄</button>
                    </div>
                    <div class="form-group">
                        <label>To</label>
                        <select id="to" class="form-control" required>
                            <option value="">Select City</option>
                            <option value="Delhi">Delhi</option>
                            <option value="Mumbai">Mumbai</option>
                            <option value="Bangalore">Bangalore</option>
                            <option value="Chennai">Chennai</option>
                            <option value="Hyderabad">Hyderabad</option>
                            <option value="Kolkata">Kolkata</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Departure Date</label>
                        <input type="date" id="date" class="form-control" required>
                    </div>
                </div>

                <div class="search-fields-row2">
                    <div class="form-group">
                        <label>Passengers</label>
                        <select id="passengers" class="form-control">
                            <option value="1">1 Passenger</option>
                            <option value="2">2 Passengers</option>
                            <option value="3">3 Passengers</option>
                            <option value="4">4 Passengers</option>
                            <option value="5">5 Passengers</option>
                            <option value="6">6 Passengers</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Class</label>
                        <select id="seatClass" class="form-control">
                            <option value="economy">Economy</option>
                            <option value="business">Business</option>
                        </select>
                    </div>
                    <div class="form-group" style="display:flex;align-items:flex-end">
                        <button type="submit" class="btn btn-primary btn-lg btn-full">Search Flights</button>
                    </div>
                </div>
            </form>
        </div>
    </section>

    <script>
        document.getElementById('date').min = new Date().toISOString().split('T')[0];

        const user = JSON.parse(sessionStorage.getItem('user') || '{}');
        if (user.username) {
            document.getElementById('userGreeting').textContent = user.username;
        }

        function toggleUserDropdown() {
            document.getElementById('userDropdownMenu').classList.toggle('show');
        }

        document.addEventListener('click', function(e) {
            const wrapper = document.querySelector('.user-dropdown-wrapper');
            if (wrapper && !wrapper.contains(e.target)) {
                document.getElementById('userDropdownMenu').classList.remove('show');
            }
        });

        function swapCities() {
            const from = document.getElementById('from');
            const to = document.getElementById('to');
            const temp = from.value;
            from.value = to.value;
            to.value = temp;
        }

        function searchFlights(e) {
            e.preventDefault();
            const from = document.getElementById('from').value;
            const to = document.getElementById('to').value;

            if (from === to) {
                document.getElementById('searchErrorMsg').textContent = 'Source and destination cannot be the same!';
                document.getElementById('searchErrorMsg').classList.remove('hidden');
                return false;
            }

            document.getElementById('searchErrorMsg').classList.add('hidden');

            const params = new URLSearchParams({
                from, to,
                date: document.getElementById('date').value,
                passengers: document.getElementById('passengers').value,
                seatClass: document.getElementById('seatClass').value
            });

            window.location.href = `flightresults.html?${params.toString()}`;
            return false;
        }
    </script>

</body>
</html>
